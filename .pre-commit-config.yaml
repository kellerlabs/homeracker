---
repos:
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
        args:
          [
            "--line-length=121"
          ]
  - repo: https://github.com/kellerlabs/pre-commit-hooks
    rev: pre-commit-hooks-v0.3.0
    hooks:
      - id: optimize-images
  - repo: local
    hooks:
      - id: flatten-validate
        name: Validate Flatten Exports
        entry: flatten-validate
        language: system
        pass_filenames: false
        always_run: true
        files: '^(scadm\.json|models/.*\.scad|cmd/scadm/scadm/flatten\.py)'
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args:
          - --maxkb=1000
  - repo: https://github.com/renovatebot/pre-commit-hooks
    rev: 43.129.0
    hooks:
      - id: renovate-config-validator
        args: ["--strict"]
        language_version: lts
        files: ^renovate\.json5$
  - repo: https://github.com/detailyang/pre-commit-shell
    rev: v1.0.6
    hooks:
      - id: shell-lint
        args: [--external-sources]
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: ['-c', '.lint/yamllint/.yamllint']
  - repo: https://github.com/PyCQA/pylint
    rev: v4.0.5
    hooks:
      - id: pylint
        args:
          [
            "--rcfile=.lint/pylint/.pylintrc"
          ]
  - repo: local
    hooks:
      - id: scadm-tests
        name: scadm Python Tests
        entry: bash -c 'cd cmd/scadm && python -m pytest tests/ -v -m "not integration"'
        language: system
        pass_filenames: false
        files: '^cmd/scadm/'
...
