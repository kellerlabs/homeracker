---
name: Validate OpenSCAD Models

on:
  pull_request:
    paths:
      - 'models/**/*.scad'
      - '.github/workflows/validate-models.yml'
      - 'cmd/scadm/**'
      - 'scadm.json'
      - 'cmd/test/openscad-render.sh'

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup OpenSCAD
        uses: ./.github/actions/setup-openscad

      - name: Validate models
        run: |
          chmod +x cmd/test/test-models.sh cmd/test/openscad-render.sh
          ./cmd/test/test-models.sh

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: render-logs
          path: /tmp/*.log
          retention-days: 7
