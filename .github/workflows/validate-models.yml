---
name: Validate OpenSCAD Models

on:
  pull_request:
    paths:
      - 'models/**/*.scad'
      - '.github/workflows/validate-models.yml'
      - 'cmd/scadm/**'
      - 'scadm.json'
      - 'cmd/test/openscad-render.sh'

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          cache: 'pip'
          cache-dependency-path: cmd/scadm/pyproject.toml

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libglu1-mesa libfuse2 libegl1 libxcb-cursor0

      - name: Cache OpenSCAD and libraries
        uses: actions/cache@v5
        with:
          path: bin/openscad
          key: openscad-${{ runner.os }}-${{ hashFiles('scadm.json', 'cmd/scadm/scadm/constants.py') }}

      - name: Install OpenSCAD and dependencies
        run: |
          pip install -e cmd/scadm
          scadm install

      - name: Validate models
        run: |
          chmod +x cmd/test/test-models.sh cmd/test/openscad-render.sh
          ./cmd/test/test-models.sh

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: render-logs
          path: /tmp/*.log
          retention-days: 7
