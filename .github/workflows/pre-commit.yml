---
name: Pre-commit

on:
  pull_request:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          cache: 'pip'
          cache-dependency-path: cmd/scadm/pyproject.toml

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libglu1-mesa libfuse2 libegl1 libxcb-cursor0

      - name: Cache OpenSCAD and libraries
        uses: actions/cache@v5
        with:
          path: bin/openscad
          key: openscad-${{ runner.os }}-${{ hashFiles('scadm.json', 'cmd/scadm/scadm/constants.py') }}

      - name: Install OpenSCAD and dependencies
        run: |
          pip install -e cmd/scadm
          scadm install

      - name: Make scripts executable
        run: chmod +x cmd/export/export-core-models.sh .githooks/makerworld-export

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
